<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ways2Spain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f0eb;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: #c0392b;
    }

    header p {
      font-size: 1.2rem;
      color: #555;
      margin-top: 0.5rem;
    }

    .hero {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 3rem;
      max-width: 560px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .hero h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .hero p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .btn {
      display: inline-block;
      background: #c0392b;
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn:hover { background: #a93226; }

    footer {
      margin-top: 3rem;
      color: #aaa;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>🇪🇸 Ways2Spain</h1>
    <p>Ваш шлях до Іспанії</p>
  </header>

  <div class="hero">
    <h2>Сайт у розробці</h2>
    <p>Незабаром тут з'явиться все необхідне для переїзду, подорожей та життя в Іспанії.</p>
    <a href="mailto:sylenko.vita@gmail.com" class="btn">Зв'язатись</a>
  </div>

  <footer>
    &copy; 2026 Ways2Spain
  </footer>

</body>
</html>
